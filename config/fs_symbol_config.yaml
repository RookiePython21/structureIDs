# config/fs_symbol_config.yaml
# FS-Symbol configuration for civil engineering structure detection.
# Architecture: Faster R-CNN + ResNet-101 + FPN + cosine similarity classifier.
# Built on Detectron2; training scripts override SOLVER/INPUT per stage.

MODEL:
  META_ARCHITECTURE: "GeneralizedRCNN"
  BACKBONE:
    NAME: "build_resnet_fpn_backbone"
  RESNETS:
    OUT_FEATURES: ["res2", "res3", "res4", "res5"]
    DEPTH: 101
    NORM: "FrozenBN"
  FPN:
    IN_FEATURES: ["res2", "res3", "res4", "res5"]
  ANCHOR_GENERATOR:
    SIZES: [[32], [64], [128], [256], [512]]
    ASPECT_RATIOS: [[0.5, 1.0, 2.0]]
  RPN:
    IN_FEATURES: ["p2", "p3", "p4", "p5", "p6"]
    PRE_NMS_TOPK_TRAIN: 2000
    PRE_NMS_TOPK_TEST: 1000
    POST_NMS_TOPK_TRAIN: 1000
    POST_NMS_TOPK_TEST: 1000
    NMS_THRESH: 0.7
  ROI_HEADS:
    NAME: "StandardROIHeads"
    IN_FEATURES: ["p2", "p3", "p4", "p5"]
    # 3 base + 1 novel = 4 detection classes
    # Masked out (not detected): notes, title_exclusion, legend, compass, site_map
    NUM_CLASSES: 4
    SCORE_THRESH_TEST: 0.05
    NMS_THRESH_TEST: 0.5
    BATCH_SIZE_PER_IMAGE: 512
    POSITIVE_FRACTION: 0.25
  ROI_BOX_HEAD:
    NAME: "FastRCNNConvFCHead"
    NUM_FC: 2
    FC_DIM: 1024
    POOLER_RESOLUTION: 7
    POOLER_SAMPLING_RATIO: 0
    POOLER_TYPE: "ROIAlignV2"
    SMOOTH_L1_BETA: 0.0
    BBOX_REG_WEIGHTS: [10.0, 10.0, 5.0, 5.0]
  # Pretrained ImageNet weights — override in training scripts
  WEIGHTS: "detectron2://ImageNetPretrained/MSRA/R-101.pkl"

# ---- Stage 1 defaults (base training) ----
SOLVER:
  BASE_LR: 0.01
  MOMENTUM: 0.9
  WEIGHT_DECAY: 0.0001
  WARMUP_ITERS: 500
  WARMUP_FACTOR: 0.001
  IMS_PER_BATCH: 8
  MAX_ITER: 17000
  STEPS: [10000, 14000]
  GAMMA: 0.1
  CHECKPOINT_PERIOD: 2000
  CLIP_GRADIENTS:
    ENABLED: True
    CLIP_VALUE: 1.0
    CLIP_TYPE: "value"

INPUT:
  # Multiscale training (no flip — text labels must stay readable)
  MIN_SIZE_TRAIN: [480, 512, 544, 576, 608, 640, 672, 704, 736, 768, 800]
  MAX_SIZE_TRAIN: 1333
  MIN_SIZE_TEST: 640
  MAX_SIZE_TEST: 1333
  RANDOM_FLIP: "none"
  FORMAT: "BGR"

DATASETS:
  TRAIN: ["civil_structures_train_base"]
  TEST: ["civil_structures_test"]

TEST:
  EVAL_PERIOD: 2000
  DETECTIONS_PER_IMAGE: 300

DATALOADER:
  NUM_WORKERS: 2
  FILTER_EMPTY_ANNOTATIONS: True

OUTPUT_DIR: "./checkpoints/base"

# ---- FS-Symbol custom options ----
# These are read by model/fs_symbol.py helpers
FS_SYMBOL:
  # Cosine similarity scale factor (temperature)
  COSINE_SCALE: 20.0
  # Novel class IDs (0-indexed in the classifier output)
  # BASE:  square_structure=0, circle_structure=1, headwall=2
  # NOVEL: rip_rap=3
  # Masked: notes, compass, site_map, title_exclusion, legend (white-filled, not detected)
  # Background = class index 4 (handled internally)
  NOVEL_CLASS_IDS: [3]
  BASE_CLASS_IDS: [0, 1, 2]
  # Stage 2 training settings
  STAGE2:
    BASE_LR: 0.0005
    MAX_ITER: 3200
    STEPS: [2400, 3000]
    WARMUP_ITERS: 200
    IMS_PER_BATCH: 4
    CHECKPOINT_PERIOD: 400
